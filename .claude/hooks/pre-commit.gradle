#!/bin/bash
# Pre-commit hook for taotao-cloud-standalone
# Runs code quality checks before commit

echo "Running pre-commit checks..."

# Run compile to check for compilation errors
./gradlew compileJava 2>/dev/null
if [ $? -ne 0 ]; then
    echo "❌ Compilation failed. Fix errors before committing."
    exit 1
fi

# Run Checkstyle
./gradlew checkstyleMain 2>/dev/null
if [ $? -ne 0 ]; then
    echo "⚠️  Checkstyle found issues. Review warnings before committing."
fi

echo "✅ Pre-commit checks passed."
